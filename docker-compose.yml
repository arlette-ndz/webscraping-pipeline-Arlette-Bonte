services:

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: flights_db
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flights_network
    restart: unless-stopped

  # ── PgAdmin ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flights_pgadmin
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin_servers.json:/pgadmin4/servers.json
    depends_on:
      db:
        condition: service_healthy
    networks:
      - flights_network
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flights_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flights_network
    restart: unless-stopped

  # ── API Flask ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: flights_api
    env_file: .env
    environment:
      DB_HOST:     db
      DB_PORT:     ${POSTGRES_PORT}
      DB_NAME:     ${POSTGRES_DB}
      DB_USER:     ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL:   ${REDIS_URL}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app/api
      - ./celery_app:/app/celery_app
      - ./flight_scraper:/app/flight_scraper
      - ./collector:/app/collector
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flights_network
    restart: unless-stopped

  # ── Celery Worker ───────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: flights_celery_worker
    command: celery -A celery_app.tasks worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DB_HOST:     db
      DB_PORT:     ${POSTGRES_PORT}
      DB_NAME:     ${POSTGRES_DB}
      DB_USER:     ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL:   ${REDIS_URL}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
    volumes:
      - ./celery_app:/app/celery_app
      - ./flight_scraper:/app/flight_scraper
      - ./collector:/app/collector
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flights_network
    restart: unless-stopped

  # ── Celery Beat (planification) ─────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: flights_celery_beat
    command: celery -A celery_app.tasks beat --loglevel=info
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ./celery_app:/app/celery_app
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - flights_network
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  flights_network:
    driver: bridge
